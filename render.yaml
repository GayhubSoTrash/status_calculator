services:
  - type: web
    name: gadget-socketio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STOCK_BROADCAST_INTERVAL_SEC
        value: 3600
      - key: DISCORD_WEBHOOK_URL
        sync: false
